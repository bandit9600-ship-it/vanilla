<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Momentum - Hoon</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="overlay"></div>

    <main class="app">
      <section class="top-bar">
        <div id="weather" class="weather">
          <span>📍 위치 확인 중...</span>
        </div>
      </section>

      <section class="hero">
        <h2 id="clock">00:00:00</h2>

        <form id="login-form" class="hidden">
          <input
            required
            maxlength="15"
            type="text"
            placeholder="이름을 입력하세요"
          />
          <button>로그인</button>
        </form>

        <div id="greeting-box" class="hidden">
          <h1 id="greeting"></h1>
          <button id="logout-button" type="button">로그아웃</button>
        </div>

        <section id="todo-section" class="hidden">
          <form id="todo-form">
            <input
              required
              type="text"
              placeholder="오늘 할 일을 입력하세요"
            />
          </form>

          <ul id="todo-list"></ul>
        </section>
      </section>

      <footer>
        <p id="quote"></p>
      </footer>
    </main>

    <script src="js/app.js"></script>
  </body>
</html>
